<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Empleados - Messenger-Flash</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-container { background-color: #ffffff; width: 100%; max-width: 550px; padding: 35px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #e94560; font-size: 28px; font-weight: 800; letter-spacing: 1px; }
        .header p { color: #666; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333333; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; color: #333333; transition: all 0.3s ease; background: #fff; }
        input[type="file"] { background-color: #f8f9fa; padding: 8px; cursor: pointer; }
        input:focus { outline: none; border-color: #e94560; }
        .checkbox-group { display: flex; align-items: flex-start; margin: 15px 0; background-color: #f9f9f9; padding: 12px; border-radius: 8px; border-left: 4px solid #e94560; }
        .checkbox-group input { margin-top: 3px; margin-right: 12px; transform: scale(1.2); cursor: pointer; }
        .checkbox-group label { font-weight: 500; font-size: 13.5px; color: #444444; cursor: pointer; line-height: 1.4; }
        .btn-submit { display: flex; align-items: center; justify-content: center; width: 100%; background-color: #e94560; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background-color 0.3s ease; box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3); }
        .btn-submit:hover { background-color: #b83248; }
        .alert-info { background-color: #e3f2fd; color: #0d47a1; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; line-height: 1.4; border-left: 4px solid #1e88e5; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <h1>Messenger-Flash</h1>
        <p>Formulario de Alta para Empleados</p>
    </div>

    <div class="alert-info">
        <strong>¿Cómo funciona?</strong> Al enviar la postulación, los documentos se enviarán a tu correo y se abrirá WhatsApp para confirmar el envío.
    </div>
    
    <!-- URL de Formspree configurada correctamente -->
    <form id="empleadoForm" action="https://formspree.io/f/mdajbyyl" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="nombre">Nombre Completo del Empleado</label>
            <input type="text" id="nombre" name="Nombre Completo" placeholder="Ej. Carlos Augusto Gómez" required>
        </div>

        <div class="form-group">
            <label for="dni">Número de DNI</label>
            <input type="number" id="dni" name="DNI" placeholder="Solo números, sin puntos" required>
        </div>

        <div class="form-group">
            <label for="direccion">Dirección Exacta de Domicilio</label>
            <input type="text" id="direccion" name="Dirección" placeholder="Calle, Número, Barrio, Localidad" required>
        </div>

        <div class="form-group">
            <label for="dniFrente">Foto DNI (Frente) — <span style="color:#e94560;">Obligatorio</span></label>
            <input type="file" id="dniFrente" name="DNI Frente" accept="image/*" required>
        </div>

        <div class="form-group">
            <label for="dniDorso">Foto DNI (Dorso) — <span style="color:#e94560;">Obligatorio</span></label>
            <input type="file" id="dniDorso" name="DNI Dorso" accept="image/*" required>
        </div>

        <div class="form-group">
            <label for="boleta">Boleta de Servicio (Luz, Gas, Internet)</label>
            <input type="file" id="boleta" name="Boleta Servicio" accept="image/*,application/pdf" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="conducta" name="Certificado Conducta" value="Posee certificado limpio" required>
            <label for="conducta">Confirmo bajo declaración jurada que poseo el Certificado de Buena Conducta vigente y limpio.</label>
        </div>

        <button type="submit" class="btn-submit">
            Enviar Postulación Obligatoria
        </button>

    </form>
</div>

<script>
const formulario = document.getElementById('empleadoForm');

formulario.addEventListener('submit', function(e) {
    // 1. Validar checkbox (seguridad extra)
    const conducta = document.getElementById('conducta');
    if (!conducta.checked) {
        alert("Debes confirmar que posees el certificado de buena conducta.");
        e.preventDefault();
        return;
    }

    // 2. Capturar datos para WhatsApp
    const nombre = document.getElementById('nombre').value;
    const dni = document.getElementById('dni').value;
    const direccion = document.getElementById('direccion').value;
    const telefono = "5493815727447";

    // 3. Crear mensaje
    const mensaje = "⚡ *MESSENGER-FLASH - NUEVO POSTULANTE* ⚡\n\n" +
                    "👤 *Nombre:* " + nombre + "\n" +
                    "🪪 *DNI:* " + dni + "\n" +
                    "📍 *Dirección:* " + direccion + "\n\n" +
                    "✅ *Buena Conducta:* Confirmado.\n\n" +
                    "📧 *Nota:* Los archivos adjuntos (DNI y Boleta) se han enviado correctamente a poncejose027@gmail.com a través del formulario.";

    // 4. Permitir que el formulario se envíe a Formspree primero
    // Usamos un pequeño retraso para abrir WhatsApp después de iniciar el envío de archivos
    setTimeout(() => {
        const mensajeCodificado = encodeURIComponent(mensaje);
        const urlWhatsApp = `https://wa.me/${telefono}?text=${mensajeCodificado}`;
        window.open(urlWhatsApp, '_blank');
    }, 1500); 
});
</script>

</body>
                </html>
